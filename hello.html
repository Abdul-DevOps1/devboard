<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevBoard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#5b21b6,#7c3aed,#a855f7);
    color:white;
}

.container{
    text-align:center;
    max-width:600px;
    padding:2rem;
}

h1{
    font-size:3rem;
    margin-bottom:1rem;
}

p{
    font-size:1.1rem;
    opacity:0.9;
    margin-bottom:2rem;
}

button{
    border:none;
    padding:12px 24px;
    border-radius:10px;
    background:white;
    color:#6d28d9;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}
</style>
</head>
<body>

<div class="container">
    <h1>DevBoard</h1>
    <p>Organize tasks, track progress, and stay productive with a simple developer-focused task tracker.</p>
    <button>Get Started</button>
</div>

</body>
</html>
